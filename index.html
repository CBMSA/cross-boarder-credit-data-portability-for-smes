<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoChat – Business Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Dark Web 3.0 Style */
    :root {
      --bg: #111212; /* Dark background */
      --card: #22262A; /* Dark card color */
      --text: #E6E6E6; /* Light text */
      --muted: #888; /* Muted text */
      --accent: #0B5CFF; /* Accent color */
      --highlight: #E20F5B; /* Highlight color */
      --border: #333; /* Dark border */
    }

    [data-theme="dark"] {
      --bg: #0b0e11; /* Dark background for dark mode */
      --card: #1e2329; /* Dark card color for dark mode */
      --text: #eaecef; /* Light text for dark mode */
      --muted: #848e9c; /* Muted text for dark mode */
      --accent: #f0b90b; /* Accent color for dark mode */
      --highlight: #ff4569; /* Bright highlight for dark mode */
      --border: #4b4f54; /* Border color for dark mode */
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    header {
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.2);
    }

    .app {
      display: flex;
      height: calc(100vh - 56px);
    }

    .sidebar {
      width: 64px;
      background: var(--card);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.3);
    }

    .sidebar a, .sidebar button {
      background: none;
      border: none;
      font-size: 20px;
      padding: 12px;
      cursor: pointer;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.3s;
    }

    .sidebar a:hover, .sidebar button:hover {
      color: var(--accent);
    }

    main {
      flex: 1;
      padding: 16px;
      overflow: auto;
    }

    .page {
      display: none;
    }

    .page.active {
      display: block;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      box-shadow: 0px 2px 10px rgba(0, 0, 0, 0.1);
    }

    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 8px;
    }

    .rates-window, .chat-window {
      display: flex;
      flex-direction: column;
      height: 50vh;
      overflow: auto;
      background: #f0f2f5;
      padding: 8px;
      border-radius: 12px;
    }

    .rate {
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 6px;
      font-size: 14px;
      background-color: #2e2f36;
      color: var(--text);
      box-shadow: 0px 2px 5px rgba(0, 0, 0, 0.1);
    }

    .msg {
      max-width: 70%;
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .msg.me {
      align-self: flex-end;
      background: var(--accent);
      color: #fff;
    }

    .msg.them {
      align-self: flex-start;
      background: #444c56;
      color: #fff;
    }

    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0px 2px 6px rgba(0, 0, 0, 0.2);
    }

    .form-container {
      margin-top: 20px;
    }

    .form-container input,
    .form-container button {
      margin-top: 10px;
      width: 100%;
    }

    footer {
      background: var(--card);
      color: var(--muted);
      padding: 10px;
      text-align: center;
      position: fixed;
      bottom: 0;
      width: 100%;
      box-shadow: 0px -2px 6px rgba(0, 0, 0, 0.1);
    }

    footer a {
      color: var(--accent);
      text-decoration: none;
    }
  </style>
</head>

<body data-theme="dark">

  <header>
    <strong>PhotoChat – Business Dashboard</strong>
    <button onclick="toggleTheme()">🌓</button>
  </header>

  <div class="app">

    <aside class="sidebar">
      <button onclick="go('rates')"><i class="bi bi-currency-exchange"></i> Rates</button>
      <button onclick="go('chat')"><i class="bi bi-chat"></i> Chat</button>
      <button onclick="go('signin')"><i class="bi bi-person-circle"></i> Sign In</button>
      <button onclick="go('signup')"><i class="bi bi-person-add"></i> Sign Up</button>
    </aside>

    <main>

      <!-- Live Rates Section -->
      <section id="rates" class="page active">
        <div class="card">
          <h3>Live Crypto & FX Rates</h3>
          <div class="rates-window" id="ratesWindow"></div>
          <button class="primary" onclick="fetchRates()">Fetch Live Rates</button>
        </div>
      </section>

      <!-- OpenAI Chat Section -->
      <section id="chat" class="page">
        <div class="card">
          <h3>Chat with OpenAI</h3>
          <div class="chat-window" id="chatWindow"></div>
          <input id="msgInput" placeholder="Ask something…">
          <button class="primary" onclick="sendMsg()">Send</button>
        </div>
      </section>

      <!-- Sign In Section -->
      <section id="signin" class="page">
        <div class="card">
          <h3>Sign In</h3>
          <div class="form-container">
            <input id="signinEmail" placeholder="Email" type="email">
            <input id="signinPassword" placeholder="Password" type="password">
            <button class="primary" onclick="signIn()">Sign In</button>
          </div>
        </div>
      </section>

      <!-- Sign Up Section -->
      <section id="signup" class="page">
        <div class="card">
          <h3>Sign Up</h3>
          <div class="form-container">
            <input id="signupEmail" placeholder="Email" type="email">
            <input id="signupPassword" placeholder="Password" type="password">
            <input id="accountType" placeholder="Account Type (business/personal)" type="text">
            <button class="primary" onclick="signUp()">Sign Up</button>
          </div>
        </div>
      </section>

      <!-- Dashboard or Profile Section -->
      <section id="profile" class="page">
        <div class="card">
          <h3>Welcome, <span id="userName"></span></h3>
          <div id="userDetails"></div>
        </div>
      </section>

    </main>
  </div>

  <footer>
  <p>NB: THE WEBSITE ISUNDER SOME UPGRADED TILL FEATURE NOTICE , WE'RE SORRY FOR THE INCONVINIENCE CAUSED
    <p>&copy; 2026 <a href="#">SadiCoin Tech</a>. All rights reserved.</p>
  </footer>

  <script>
    // Functionality for theme toggle, user auth, chat and rates will be the same as in the previous code
    // Just like previous implementations: fetchRates(), sendMsg(), signUp(), signIn()...

    // Placeholder functions for handling user sign-in, sign-up, and fetching rates and data
    function go(p) {
      document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
      document.getElementById(p).classList.add('active');
    }

    function toggleTheme() {
      document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
    }
  </script>

</body>
</html>
