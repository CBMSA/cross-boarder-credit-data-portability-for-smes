<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoChat – Business Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root {
      --bg: #f5f6f8;
      --card: #fff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #0b5cff;
    }
    [data-theme="dark"] {
      --bg: #0b0e11;
      --card: #1e2329;
      --text: #eaecef;
      --muted: #848e9c;
      --accent: #f0b90b;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      font-family: Inter;
      background: var(--bg);
      color: var(--text);
    }
    header {
      height: 56px;
      background: var(--card);
      border-bottom: 1px solid #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
    }
    .app {
      display: flex;
      height: calc(100vh - 56px);
    }
    .sidebar {
      width: 64px;
      background: var(--card);
      border-right: 1px solid #e5e7eb;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .sidebar a, .sidebar button {
      background: none;
      border: none;
      font-size: 20px;
      padding: 12px;
      cursor: pointer;
      color: var(--muted);
      text-decoration: none;
    }
    .sidebar a:hover, .sidebar button:hover {
      color: var(--accent);
    }
    main {
      flex: 1;
      padding: 16px;
      overflow: auto;
    }
    .page {
      display: none;
    }
    .page.active {
      display: block;
    }
    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
    }
    input {
      width: 100%;
      padding: 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      margin-bottom: 8px;
    }
    .rates-window {
      display: flex;
      flex-direction: column;
      height: 50vh;
      overflow: auto;
      background: #f0f2f5;
      padding: 8px;
      border-radius: 12px;
    }
    .rate {
      padding: 10px;
      border-radius: 12px;
      margin-bottom: 6px;
      font-size: 14px;
      background-color: #e5e7eb;
    }
    button.primary {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 14px;
      border-radius: 8px;
      cursor: pointer;
    }
    .form-container {
      margin-top: 20px;
    }
    .form-container input,
    .form-container button {
      margin-top: 10px;
      width: 100%;
    }
  </style>
</head>

<body data-theme="light">

  <header>
    <strong>PhotoChat – Business Dashboard</strong>
    <button onclick="toggleTheme()">🌓</button>
  </header>

  <div class="app">

    <aside class="sidebar">
      <button onclick="go('rates')"><i class="bi bi-chat"></i> Rates</button>
      <button onclick="go('signin')"><i class="bi bi-person-circle"></i> Sign In</button>
      <button onclick="go('signup')"><i class="bi bi-person-add"></i> Sign Up</button>
    </aside>

    <main>

      <!-- Live Rates Section -->
      <section id="rates" class="page active">
        <div class="card">
          <h3>Live Crypto & FX Rates</h3>
          <div class="rates-window" id="ratesWindow"></div>
          <button class="primary" onclick="fetchRates()">Fetch Live Rates</button>
        </div>
      </section>

      <!-- Sign In Section -->
      <section id="signin" class="page">
        <div class="card">
          <h3>Sign In</h3>
          <div class="form-container">
            <input id="signinEmail" placeholder="Email" type="email">
            <input id="signinPassword" placeholder="Password" type="password">
            <button class="primary" onclick="signIn()">Sign In</button>
          </div>
        </div>
      </section>

      <!-- Sign Up Section -->
      <section id="signup" class="page">
        <div class="card">
          <h3>Sign Up</h3>
          <div class="form-container">
            <input id="signupEmail" placeholder="Email" type="email">
            <input id="signupPassword" placeholder="Password" type="password">
            <input id="accountType" placeholder="Account Type (business/personal)" type="text">
            <button class="primary" onclick="signUp()">Sign Up</button>
          </div>
        </div>
      </section>

      <!-- Dashboard or Profile Section -->
      <section id="profile" class="page">
        <div class="card">
          <h3>Welcome, <span id="userName"></span></h3>
          <div id="userDetails"></div>
        </div>
      </section>

    </main>
  </div>

  <script>
    // Supabase Configuration
    const supabase = supabase.createClient(
      "https://your.supabase.url",
      "YOUR_PUBLIC_ANON_KEY"
    );

    // Sign-up functionality
    async function signUp() {
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPassword").value;
      const accountType = document.getElementById("accountType").value;

      const { user, error } = await supabase.auth.signUp({
        email: email,
        password: password
      });

      if (error) {
        alert("Error signing up: " + error.message);
      } else {
        // Store user account type (business/personal)
        await supabase.from("users").insert([{ email, account_type: accountType }]);
        alert("Account created successfully!");
        go('profile');
        document.getElementById("userName").textContent = user.email;
        displayUserInfo(user.email);
      }
    }

    // Sign-in functionality
    async function signIn() {
      const email = document.getElementById("signinEmail").value;
      const password = document.getElementById("signinPassword").value;

      const { user, error } = await supabase.auth.signIn({
        email: email,
        password: password
      });

      if (error) {
        alert("Error signing in: " + error.message);
      } else {
        alert("Sign-in successful!");
        go('profile');
        document.getElementById("userName").textContent = user.email;
        displayUserInfo(user.email);
      }
    }

    // Display User Info based on Email (Example: Show profile info)
    async function displayUserInfo(email) {
      const { data, error } = await supabase.from("users").select("*").eq("email", email);
      if (data && data.length > 0) {
        const userInfo = data[0];
        document.getElementById("userDetails").innerHTML = `
          <p>Account Type: ${userInfo.account_type}</p>
        `;
      }
    }

    // Function to fetch Live Crypto and FX Rates
    async function fetchRates() {
      // Fetch Crypto Data (Example: Bitcoin)
      const cryptoRes = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=bitcoin,ethereum&vs_currencies=usd');
      const cryptoData = await cryptoRes.json();
      
      // Fetch FX Data from Edhoh API
      const fxRes = await fetch('https://edhohapi.com/fx?base=USD');
      const fxData = await fxRes.json();
      
      displayRates(cryptoData, fxData);
    }

    function displayRates(cryptoData, fxData) {
      const ratesWindow = document.getElementById('ratesWindow');
      
      // Clear previous content
      ratesWindow.innerHTML = '';

      // Display Crypto Rates
      const bitcoinRate = document.createElement('div');
      bitcoinRate.className = 'rate';
      bitcoinRate.textContent = `Bitcoin (BTC) Price: $${cryptoData.bitcoin.usd}`;
      ratesWindow.appendChild(bitcoinRate);

      const ethereumRate = document.createElement('div');
      ethereumRate.className = 'rate';
      ethereumRate.textContent = `Ethereum (ETH) Price: $${cryptoData.ethereum.usd}`;
      ratesWindow.appendChild(ethereumRate);
      
      // Display FX Rates from Edhoh API
      Object.keys(fxData.rates).forEach((currency) => {
        const fxRate = document.createElement('div');
        fxRate.className = 'rate';
        fxRate.textContent = `1 USD = ${fxData.rates[currency]} ${currency}`;
        ratesWindow.appendChild(fxRate);
      });
    }

    // Routing logic for content switching
    function go(p) {
      document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
      document.getElementById(p).classList.add('active');
    }

    // Theme toggle function
    function toggleTheme() {
      document.body.dataset.theme =
        document.body.dataset.theme === "dark" ? "light" : "dark";
    }

    // Set initial rates on page load
    window.onload = fetchRates;

  </script>

</body>
</html>
