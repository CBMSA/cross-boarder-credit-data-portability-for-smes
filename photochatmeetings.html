<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PhotoChat – Business Dashboard</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* Styles for the layout and appearance */
    :root {
      --bg: #f5f6f8;
      --card: #fff;
      --text: #111827;
      --muted: #6b7280;
      --accent: #0b5cff;
    }
    /* More styles... */
  </style>
</head>

<body data-theme="light">

  <header>
    <strong>PhotoChat – Business Dashboard</strong>
    <button onclick="toggleTheme()">🌓</button>
  </header>

  <div class="app">

    <aside class="sidebar">
      <button onclick="go('rates')"><i class="bi bi-currency-exchange"></i> Rates</button>
      <button onclick="go('chat')"><i class="bi bi-chat"></i> Chat</button>
      <button onclick="go('signin')"><i class="bi bi-person-circle"></i> Sign In</button>
      <button onclick="go('signup')"><i class="bi bi-person-add"></i> Sign Up</button>
    </aside>

    <main>

      <!-- Live Rates Section -->
      <section id="rates" class="page active">
        <div class="card">
          <h3>Live Crypto & FX Rates</h3>
          <div class="rates-window" id="ratesWindow"></div>
          <button class="primary" onclick="fetchRates()">Fetch Live Rates</button>
        </div>
      </section>

      <!-- OpenAI Chat Section -->
      <section id="chat" class="page">
        <div class="card">
          <h3>Chat with OpenAI</h3>
          <div class="chat-window" id="chatWindow"></div>
          <input id="msgInput" placeholder="Ask something…">
          <button class="primary" onclick="sendMsg()">Send</button>
        </div>
      </section>

      <!-- Sign In Section -->
      <section id="signin" class="page">
        <div class="card">
          <h3>Sign In</h3>
          <div class="form-container">
            <input id="signinEmail" placeholder="Email" type="email">
            <input id="signinPassword" placeholder="Password" type="password">
            <button class="primary" onclick="signIn()">Sign In</button>
          </div>
        </div>
      </section>

      <!-- Sign Up Section -->
      <section id="signup" class="page">
        <div class="card">
          <h3>Sign Up</h3>
          <div class="form-container">
            <input id="signupEmail" placeholder="Email" type="email">
            <input id="signupPassword" placeholder="Password" type="password">
            <input id="accountType" placeholder="Account Type (business/personal)" type="text">
            <button class="primary" onclick="signUp()">Sign Up</button>
          </div>
        </div>
      </section>

      <!-- Dashboard or Profile Section -->
      <section id="profile" class="page">
        <div class="card">
          <h3>Welcome, <span id="userName"></span></h3>
          <div id="userDetails"></div>
        </div>
      </section>

    </main>
  </div>

  <script>
    // Fetch data from the backend (FX, Crypto, SDC, ETFs)
    async function fetchRates() {
      const res = await fetch('http://localhost:5000/rates');
      const data = await res.json();
      
      // Display FX Rates
      const ratesWindow = document.getElementById('ratesWindow');
      ratesWindow.innerHTML = '';
      const { fxRates, cryptoRates, sdcRates, etfRates } = data;
      
      // Display FX Rates
      Object.keys(fxRates).forEach(currency => {
        ratesWindow.innerHTML += `<div class="rate-card"><span>1 USD = ${fxRates[currency]} ${currency}</span></div>`;
      });

      // Display Crypto Rates
      ratesWindow.innerHTML += `<div class="rate-card"><span>BTC/USD: $${cryptoRates.bitcoin}</span></div>`;
      ratesWindow.innerHTML += `<div class="rate-card"><span>ETH/USD: $${cryptoRates.ethereum}</span></div>`;
      ratesWindow.innerHTML += `<div class="rate-card"><span>MATIC/USD: $${cryptoRates.matic}</span></div>`;
      
      // Display SDC Rates
      ratesWindow.innerHTML += `<div class="rate-card"><span>SDC/USD: $${sdcRates.priceUsd}</span></div>`;
      ratesWindow.innerHTML += `<div class="rate-card"><span>SDC/ZAR: R${sdcRates.priceZar}</span></div>`;
      
      // Display ETF Rates
      etfRates.forEach(etf => {
        ratesWindow.innerHTML += `<div class="rate-card"><span>${etf.name}</span>$${etf.close}</div>`;
      });
    }

    // Sign-in and sign-up logic
    async function signUp() {
      const email = document.getElementById("signupEmail").value;
      const password = document.getElementById("signupPassword").value;
      const accountType = document.getElementById("accountType").value;

      const res = await fetch('http://localhost:5000/signup', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password, accountType })
      });

      const data = await res.json();
      alert(data.message);
      go('profile');
    }

    async function signIn() {
      const email = document.getElementById("signinEmail").value;
      const password = document.getElementById("signinPassword").value;

      const res = await fetch('http://localhost:5000/signin', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();
      alert(data.message);
      go('profile');
    }

    function go(p) {
      document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
      document.getElementById(p).classList.add('active');
    }

    function toggleTheme() {
      document.body.dataset.theme = document.body.dataset.theme === "dark" ? "light" : "dark";
    }

    window.onload = fetchRates;

  </script>

</body>
</html>
